<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <style>
    
    .signoff { animation: signoffIn 12s ease-in-out infinite; }
    .soc { animation: socfade 12s ease-in-out infinite; }
    .sf0 { animation-delay: 0.60s }
    .sf1 { animation-delay: 0.68s }

    @keyframes signoffIn {
      0%, 8% { opacity: 0; transform: translateY(4px); }
      18%, 90% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes socfade {
      0%, 22% { opacity: 0; }
      32%, 90% { opacity: 1; }
      100% { opacity: 0; }
    }
  
    .heart { animation: heartbeat 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .wave-front { animation: drift-front 12s linear infinite; }
    .wave-back { animation: drift-back 12s linear infinite; }

    @keyframes heartbeat {
      0%, 40% { transform: scale(1); }
      45% { transform: scale(1.18); }
      50% { transform: scale(1); }
      55% { transform: scale(1.12); }
      60%, 100% { transform: scale(1); }
    }
    @keyframes drift-front {
      from { transform: translateX(0); }
      to { transform: translateX(-160px); }
    }
    @keyframes drift-back {
      from { transform: translateX(0); }
      to { transform: translateX(256px); }
    }
  </style>
  <defs>
    <linearGradient id="wave-fade" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="15%" stop-color="#dc2626" stop-opacity="0.45"/>
      <stop offset="85%" stop-color="#dc2626" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-fade-back" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="15%" stop-color="#dc2626" stop-opacity="0.16"/>
      <stop offset="85%" stop-color="#dc2626" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </linearGradient>
    <!-- Mask to fade the wave near the left/right edges so it tucks into the rounded corners. -->
    <linearGradient id="edge-mask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="10%" stop-color="white" stop-opacity="1"/>
      <stop offset="90%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="edge-fade">
      <rect width="800" height="160" fill="url(#edge-mask)"/>
    </mask>
  </defs>

  <rect width="100%" height="100%" fill="#0d0d10" rx="14" ry="14"/>

