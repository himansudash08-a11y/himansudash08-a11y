<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    text { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    @keyframes chip0 { 0%,0% { opacity: 0; transform: translateY(6px) } 2%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip1 { 0%,3% { opacity: 0; transform: translateY(6px) } 5%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    .chip0 { animation: chip0 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip1 { animation: chip1 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  <rect width="100%" height="100%" fill="#0d0d10" rx="14" ry="14"/>

  <!-- Accent bar -->
  <rect x="56" y="74" width="56" height="3" rx="1.5" fill="#dc2626"/>

  <!-- Heading -->
  <text x="56" y="56" fill="#f7f7fb" font-size="30" font-weight="700" letter-spacing="-0.02em">Stack.</text>

  <!-- Sub-line -->
  <text x="56" y="104" fill="#a5a5b3" font-size="13" font-weight="500" letter-spacing="0.02em">2 tools I reach for daily.</text>

  <!-- Pill rows -->
  <g class="chip0">
        <rect x="324" y="134" width="75" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="361.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">PYTHON</text>
      </g>
  <g class="chip1">
        <rect x="409" y="134" width="67" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="442.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">MYSQL</text>
      </g>
</svg>